<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3cff"/>
      <stop offset="45%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#001b4d"/>
    </linearGradient>

    <linearGradient id="text" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#e8fbff"/>
      <stop offset="100%" stop-color="#9cf4ff"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#bg)"/>
  <rect x="12" y="12" width="96" height="96" rx="24" fill="rgba(0,0,0,0.18)"/>

  <circle cx="94" cy="22" r="16" fill="#ffffff" opacity="0.16"/>
  <circle cx="24" cy="94" r="18" fill="#00d4ff" opacity="0.18"/>

  <text
    x="60"
    y="73"
    text-anchor="middle"
    font-size="46"
    font-family="Trebuchet MS, Arial, sans-serif"
    font-weight="900"
    letter-spacing="-4"
    fill="url(#text)"
    filter="url(#glow)"
  >
    CZ
  </text>
</svg>
